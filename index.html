<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Special Gift</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Georgia, serif;
      height: 100vh;
      background: #f6efe6;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .page {
      display: none;
      width: 90%;
      max-width: 400px;
      animation: fade 1.2s ease;
      position: relative;
      z-index: 1;
    }

    .active {
      display: block;
    }

    .small {
      font-size: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #7b5b44;
      margin-bottom: 15px;
    }

    .big {
      font-size: 55px;
      font-weight: bold;
      color: #2a1a12;
      margin: 0;
      line-height: 1;
    }

    .name {
      font-size: 45px;
      font-weight: bold;
      color: #b07b5c;
      margin-top: 10px;
    }

    .wait {
      font-size: 45px;
      font-style: italic;
      color: #2a1a12;
    }

    .btn {
      margin-top: 30px;
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 50px;
      background: #b07b5c;
      color: white;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #8d5c44;
      transform: scale(1.03);
    }

    .book {
      font-size: 80px;
      margin-bottom: 20px;
    }

    @keyframes fade {
      from {opacity: 0; transform: translateY(25px);}
      to {opacity: 1; transform: translateY(0);}
    }

    audio {
      display: none;
    }

    /* POPUP PLAYER IPHONE STYLE */
    .music-popup {
      position: fixed;
      left: 50%;
      bottom: -200px;
      transform: translateX(-50%);
      width: 95%;
      max-width: 420px;

      background: rgba(30, 30, 30, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);

      border-radius: 24px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);

      box-shadow: 0 12px 45px rgba(0,0,0,0.5);
      transition: 0.6s ease;
      z-index: 999999;
      color: white;
      font-family: Arial, sans-serif;
    }

    .music-popup.show {
      bottom: 15px;
    }

    .music-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .music-cover {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      background: rgba(255,255,255,0.1);
      flex-shrink: 0;
      overflow: hidden;
    }

    .music-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .music-info {
      flex: 1;
      text-align: left;
    }

    .music-title {
      font-size: 14px;
      font-weight: bold;
      margin: 0;
    }

    .music-artist {
      font-size: 12px;
      opacity: 0.7;
      margin: 3px 0 0 0;
    }

    .music-subtitle {
      font-size: 11px;
      opacity: 0.65;
      margin: 6px 0 0 0;
      font-style: italic;
    }

    .music-controls {
      display: flex;
      gap: 10px;
    }

    .music-controls button {
      border: none;
      background: transparent;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    /* PROGRESS BAR POLOS */
    .progress-container {
      width: 100%;
      height: 4px;
      border-radius: 10px;
      background: rgba(255,255,255,0.25);
      margin-top: 12px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,0.8);
    }

    /* DURASI TIME */
    .music-time {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      opacity: 0.7;
      margin-top: 6px;
    }
  </style>
</head>

<body>

  <!-- AUDIO -->
  <audio id="music" loop>
    <source src="aboutyou.mp3" type="audio/mpeg">
  </audio>

  <!-- PAGE 1 -->
  <div class="page active" id="page1">
    <div class="book">🎁</div>
    <div class="small">A SPECIAL GIFT FOR YOU</div>
    <button class="btn" onclick="startStory()">OPEN STORY BOOK</button>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page2">
    <div class="wait">"Wait a second..."</div>
  </div>

  <!-- PAGE 3 -->
  <div class="page" id="page3">
    <div class="small">SOMEONE MADE THIS FOR YOU</div>
  </div>

  <!-- PAGE 4 -->
  <div class="page" id="page4">
    <div class="small">IT'S YOUR BIG DAY</div>
    <h1 class="big">HAPPY<br>BIRTHDAY</h1>
    <div class="name">YTTA</div>
  </div>

  <!-- POPUP PLAYER -->
  <div class="music-popup" id="popupPlayer">
    <div class="music-top">

      <div class="music-cover">
        <img src="cover.jpg" alt="cover">
      </div>

      <div class="music-info">
        <p class="music-title">About You</p>
        <p class="music-artist">The 1975</p>
        <p class="music-subtitle">This song reminds me of you.</p>
      </div>

      <div class="music-controls">
        <button onclick="togglePlay()">⏯</button>
        <button onclick="closePopup()">✖</button>
      </div>

    </div>

    <div class="progress-container">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="music-time">
      <span id="currentTime">0:00</span>
      <span id="remainingTime">-0:00</span>
    </div>
  </div>

  <script>
    const music = document.getElementById("music");
    const popup = document.getElementById("popupPlayer");

    const currentTimeText = document.getElementById("currentTime");
    const remainingTimeText = document.getElementById("remainingTime");
    const progressFill = document.getElementById("progressFill");

    function showPage(num) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById("page" + num).classList.add("active");
    }

    function startStory() {
      music.play();

      popup.classList.add("show");

      setTimeout(() => {
        popup.classList.remove("show");
      }, 3000);

      showPage(2);

      setTimeout(() => {
        showPage(3);
      }, 2500);

      setTimeout(() => {
        showPage(4);
      }, 4500);
    }

    function togglePlay() {
      if (music.paused) {
        music.play();
      } else {
        music.pause();
      }
    }

    function closePopup() {
      popup.classList.remove("show");
    }

    function formatTime(seconds) {
      let m = Math.floor(seconds / 60);
      let s = Math.floor(seconds % 60);
      if (s < 10) s = "0" + s;
      return m + ":" + s;
    }

    music.addEventListener("timeupdate", () => {
      if (music.duration) {
        let percent = (music.currentTime / music.duration) * 100;
        progressFill.style.width = percent + "%";

        currentTimeText.textContent = formatTime(music.currentTime);

        let remaining = music.duration - music.currentTime;
        remainingTimeText.textContent = "-" + formatTime(remaining);
      }
    });
  </script>

</body>
</html>
